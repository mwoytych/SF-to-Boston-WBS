<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SF to Boston Trip – WBS Mindmap</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #fafafa; }
    .link { fill: none; stroke: #aaa; stroke-width: 1.5px; }
    .node circle { fill: #fff; stroke: #007acc; stroke-width: 2px; }
    .node text { font-size: 12px; fill: #333; }
  </style>
</head>
<body>
  <svg id="mindmap" width="1000" height="700"></svg>
  <script>
    const data = {
      name: "SF to Boston Trip – Master WBS",
      children: [
        { name: "Project Planning", children: [
          { name: "Define scope & objectives" },
          { name: "Estimate budget (travel, lodging, meals)" },
          { name: "Develop schedule & milestones" }
        ]},
        { name: "Travel Preparation", children: [
          { name: "Book flights and hotels" },
          { name: "Arrange ground transportation" },
          { name: "Prepare packing list & documents" }
        ]},
        { name: "Execution Phase", children: [
          { name: "Departure from San Francisco" },
          { name: "Transit and arrival in Boston" },
          { name: "On-site activities & meetings" }
        ]},
        { name: "Post-Trip Activities", children: [
          { name: "Expense reporting & reconciliation" },
          { name: "Trip review & lessons learned" }
        ]}
      ]
    };

    const svg = d3.select("#mindmap"),
          width = +svg.attr("width"),
          height = +svg.attr("height"),
          g = svg.append("g").attr("transform", `translate(${width/2},${height/2})`);

    const root = d3.hierarchy(data);
    const tree = d3.tree().size([2 * Math.PI, Math.min(width, height) / 2 - 80]);
    tree(root);

    g.selectAll(".link")
      .data(root.links())
      .enter().append("path")
      .attr("class", "link")
      .attr("d", d3.linkRadial().angle(d => d.x).radius(d => d.y));

    const node = g.selectAll(".node")
      .data(root.descendants())
      .enter().append("g")
      .attr("class", "node")
      .attr("transform", d => `rotate(${d.x * 180 / Math.PI - 90}) translate(${d.y},0)`);

    node.append("circle").attr("r", 18);
    node.append("text")
      .attr("dy", "0.31em")
      .attr("x", d => d.x < Math.PI ? 22 : -22)
      .attr("text-anchor", d => d.x < Math.PI ? "start" : "end")
      .attr("transform", d => d.x >= Math.PI ? "rotate(180)" : null)
      .text(d => d.data.name);
  </script>
</body>
</html>
