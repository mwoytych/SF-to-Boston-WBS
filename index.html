<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SF to Boston Trip – Master WBS</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      margin: 0;
      padding: 40px;
      text-align: center;
    }

    /* Top box styled like lower boxes */
    .wbs-title {
      display: inline-block;
      background: #f9f9f9;
      border: 2px solid #000;
      border-radius: 8px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
      padding: 12px 30px;
      font-size: 18px;
      font-weight: 700;
      color: #222;
      position: relative;
      margin-bottom: 60px;
    }

    /* Vertical line from title to horizontal connector */
    .wbs-title::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -20px; /* adjusted to connect cleanly */
      width: 2px;
      height: 20px; /* shortened for perfect alignment */
      background: #000;
      transform: translateX(-50%);
    }

    /* Container for lower boxes */
    .wbs-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 40px;
      margin-top: 30px;
    }

    /* Horizontal connector line aligned with title vertical line */
    .wbs-container::before {
      content: "";
      position: absolute;
      top: -20px; /* matches bottom of title line */
      left: 50%;
      transform: translateX(-50%);
      width: 880px; /* spans exactly across boxes */
      height: 2px;
      background: #000;
    }

    /* Lower boxes */
    .wbs-box {
      width: 220px;
      background: #f9f9f9;
      border: 2px solid #000;
      border-radius: 8px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
      padding: 10px 15px;
      text-align: left;
      font-size: 13px;
      position: relative;
    }

    /* Vertical connectors from horizontal line to each box */
    .wbs-box::before {
      content: "";
      position: absolute;
      top: -20px;
      left: 50%;
      width: 2px;
      height: 20px;
      background: #000;
      transform: translateX(-50%);
    }

    .wbs-subtitle {
      font-weight: 700;
      color: #222;
      margin-bottom: 6px;
    }

    .wbs-list {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }

    .wbs-list li {
      margin: 3px 0;
    }

    .wbs-code {
      font-weight: 700;
      margin-right: 4px;
    }

    @media print {
      body {
        margin: 0;
        padding: 20px;
      }
      .wbs-box, .wbs-title {
        box-shadow: none;
        border: 1px solid #000;
      }
      .wbs-title::after,
      .wbs-container::before,
      .wbs-box::before {
        background: #000;
      }
    }
  </style>
</head>
<body>
  <div class="wbs-title">1. SF to Boston Trip – Master WBS</div>

  <div class="wbs-container">
    <div class="wbs-box">
      <div class="wbs-subtitle">1.2 Project Planning</div>
      <ul class="wbs-list">
        <li><span class="wbs-code">1.2.1</span>Define scope & objectives</li>
        <li><span class="wbs-code">1.2.2</span>Estimate budget (travel, lodging, meals)</li>
        <li><span class="wbs-code">1.2.3</span>Develop schedule & milestones</li>
      </ul>
    </div>

    <div class="wbs-box">
      <div class="wbs-subtitle">1.3 Travel Preparation
